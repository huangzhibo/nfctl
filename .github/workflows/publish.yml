name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.13
      - run: uv sync --frozen

      - name: Lint
        run: uv run ruff check nfctl tests

      - name: Test
        run: uv run pytest tests/ -v --tb=short

      - name: Verify version matches release tag
        run: |
          PKG_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: pyproject.toml version ($PKG_VERSION) != release tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/nfctl/${{ github.event.release.tag_name }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
